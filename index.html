
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  #draft-root{background:#0a0e1a;color:#e8eaf6;font-family:'Inter',sans-serif;min-height:600px;padding:0 0 24px;border-radius:12px;overflow:hidden}
  .d-header{background:#0d1b3e;border-bottom:2px solid #1e3a6e;padding:16px 20px;text-align:center}
  .d-header h1{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;letter-spacing:3px;color:#fff;text-transform:uppercase}
  .d-header p{font-size:11px;letter-spacing:2px;color:#5c7cbc;margin-top:2px;text-transform:uppercase}
  .d-controls{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 20px;background:#080c18}
  #btn-draw{background:#1a56c4;color:#fff;border:none;padding:10px 32px;border-radius:8px;font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:background .2s}
  #btn-draw:hover:not(:disabled){background:#2468e0}
  #btn-draw:disabled{background:#2a3a5c;color:#4a5a7c;cursor:not-allowed}
  #btn-reset{background:transparent;color:#8899bb;border:1px solid #2a3a5c;padding:8px 18px;border-radius:6px;font-size:12px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
  #btn-reset:hover{border-color:#5c7cbc;color:#b0c0dd}
  .d-pick-counter{font-size:12px;color:#5c7cbc;letter-spacing:1px}
  .d-jumbotron{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 16px}
  .d-jumbo-block{background:#0d1420;border:1px solid #1e3a6e;border-radius:10px;padding:16px;text-align:center;min-height:110px;display:flex;flex-direction:column;justify-content:center}
  .d-jumbo-label{font-size:10px;letter-spacing:2px;color:#4a6aaa;text-transform:uppercase;margin-bottom:8px}
  .d-jumbo-value{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;color:#fff;line-height:1.3;min-height:52px;display:flex;align-items:center;justify-content:center;white-space:pre-line;transition:color .15s}
  .d-jumbo-value.flashing{color:#1a56c4}
  .d-jumbo-value.landed-player{color:#f0c040}
  .d-jumbo-value.landed-team{color:#40e0a0}
  .d-roster{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 12px}
  .d-team-card{background:#0d1420;border-radius:8px;overflow:hidden;border:1px solid #1e3a6e}
  .d-team-header{padding:8px 6px;text-align:center}
  .d-team-name{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
  .d-team-owner{font-size:9px;opacity:.6;margin-top:1px}
  .d-team-count{font-size:9px;opacity:.7;margin-top:2px}
  .d-team-players{padding:4px 6px 6px;min-height:60px}
  .d-player-entry{font-size:10px;padding:3px 5px;margin:2px 0;border-radius:4px;background:rgba(255,255,255,0.05);color:#c8d4e8;line-height:1.3;opacity:0;transform:translateY(-4px);transition:opacity .4s,transform .4s}
  .d-player-entry.visible{opacity:1;transform:translateY(0)}
  .d-player-entry.anchor{opacity:.6;font-style:italic}
  .d-complete-banner{display:none;text-align:center;padding:14px;margin:8px 16px 0;background:#0d2a1a;border:1px solid #1a5c38;border-radius:8px;font-family:'Oswald',sans-serif;font-size:18px;color:#40e0a0;letter-spacing:2px;text-transform:uppercase}
</style>

<div id="draft-root">
  <div class="d-header">
    <h1>The Official Padel Draft</h1>
    <p>Lowveld Padel Franchise League &mdash; Player Allocation</p>
  </div>
  <div class="d-controls">
    <span class="d-pick-counter" id="pick-counter">Pick 0 of 0</span>
    <button id="btn-draw">Draw Next Pick</button>
    <button id="btn-reset">Reset Draft</button>
  </div>
  <div class="d-jumbotron">
    <div class="d-jumbo-block">
      <div class="d-jumbo-label">The Player(s)</div>
      <div class="d-jumbo-value" id="jumbo-player">—</div>
    </div>
    <div class="d-jumbo-block">
      <div class="d-jumbo-label">The Destination</div>
      <div class="d-jumbo-value" id="jumbo-team">—</div>
    </div>
  </div>
  <div class="d-roster" id="roster"></div>
  <div class="d-complete-banner" id="complete-banner">🏆 Draft Complete — All 40 Players Assigned 🏆</div>
</div>

<script>
const TEAMS = [
  {id:'aa',name:'Avalanche Aces',owner:'Rafiq Mohamed',nameColor:'#60a0ff',hdrBg:'#1e3666'},
  {id:'df',name:'Desert Falcons',owner:'Muhammad Mangerah',nameColor:'#ff9040',hdrBg:'#3a2010'},
  {id:'ra',name:'Rulo Apaches',owner:'Shoaib Nomani',nameColor:'#c060ff',hdrBg:'#28103a'},
  {id:'ib',name:'Ice Breakers',owner:'Irshaad Moola',nameColor:'#40c8ff',hdrBg:'#0e2436'},
  {id:'sv',name:'Sonic Viboras',owner:'Yusuf Ismail',nameColor:'#40ff90',hdrBg:'#103a20'},
];
const MAX = 8;

const ALL_PLAYERS = [
  {name:'Ayaan Mohamed',age:10,rating:1.0,father:'Rafiq Mohamed'},
  {name:'Ebrahim Mangerah',age:9,rating:1.0,father:'Muhammad Mangerah'},
  {name:'Zandre de Kok',age:23,rating:1.0,father:null},
  {name:'Mauritz van der Mescht',age:25,rating:1.0,father:null},
  {name:'Zinidine Morgan',age:26,rating:1.0,father:null},
  {name:'Sandeep Daya',age:36,rating:1.0,father:null},
  {name:'Yusuf Amod',age:27,rating:1.0,father:null},
  {name:'Huzaifah Sujee',age:13,rating:1.0,father:null},
  {name:'Yahya Sujee',age:12,rating:1.0,father:null},
  {name:'Sahal Yunus',age:26,rating:1.0,father:null},
  {name:'Mikel Pillay',age:13,rating:1.0,father:null},
  {name:'Dian Erasmus',age:35,rating:1.0,father:null},
  {name:'Adil Amod',age:35,rating:1.0,father:null},
  {name:'Jameel Valley',age:35,rating:1.0,father:null},
  {name:'Stephen Remane',age:31,rating:1.0,father:null},
  {name:'Isa Moola',age:9,rating:1.0,father:'Irshaad Moola'},
  {name:'Ruro',age:12,rating:1.0,father:'Oz'},
  {name:'Michael Smit',age:32,rating:1.12,father:null},
  {name:'Aadam Nomani',age:10,rating:1.2,father:'Nomz'},
  {name:'Zuhayr Ismail',age:10,rating:1.2,father:'Yusuf Ismail'},
  {name:'Nathan Mckenzie',age:14,rating:1.2,father:null},
  {name:'Seth van den Berg',age:12,rating:1.2,father:'Scharl'},
  {name:'Hoosein Patel',age:15,rating:1.2,father:null},
  {name:'Sailesh Nagar',age:54,rating:1.2,father:null},
  {name:'Shoaib Nomani',age:76,rating:1.2,father:null},
  {name:'Arman Bhikoo',age:11,rating:1.2,father:null},
  {name:'Mohamed Moola',age:10,rating:1.2,father:'Irshaad Moola'},
  {name:'Jogee',age:12,rating:1.2,father:null},
  {name:'Jovan Erasmus',age:31,rating:1.83,father:null},
  {name:'Akmeer Amod',age:32,rating:1.7,father:null},
  {name:'Jude',age:12,rating:1.7,father:null},
  {name:'Rafiq Mohamed',age:45,rating:2.5,father:null},
  {name:'Muhammad Mangerah',age:45,rating:2.5,father:null},
  {name:'Yusuf Ismail',age:45,rating:2.5,father:null},
  {name:'Nomz',age:45,rating:2.5,father:null},
  {name:'Christiaan van Aardt',age:31,rating:2.5,father:null},
  {name:'Fiaz Bhikoo',age:45,rating:2.5,father:null},
  {name:'Irshaad Moola',age:45,rating:2.5,father:null},
  {name:'Scharl',age:45,rating:2.5,father:null},
  {name:'Oz',age:45,rating:2.5,father:null},
];

// Anchors: owner families stay with their own team
const ANCHORS = {
  aa: ['Rafiq Mohamed','Ayaan Mohamed'],
  df: ['Muhammad Mangerah','Ebrahim Mangerah'],
  ra: ['Shoaib Nomani','Aadam Nomani','Nomz'],
  ib: ['Irshaad Moola','Mohamed Moola','Isa Moola'],
  sv: ['Yusuf Ismail','Zuhayr Ismail'],
};

// Explicit packages: Scharl+Seth together, Jude solo
// (override father-son auto-detection for Scharl's family)
const EXPLICIT_PACKAGES = [
  ['Scharl','Seth van den Berg'], // Scharl + Seth together
  ['Jude'],                        // Jude solo
];
const EXPLICIT_NAMES = new Set(EXPLICIT_PACKAGES.flat());

let draftSequence=[], currentPick=0, isAnimating=false;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function calcDraft(){
  const anchoredNames=new Set(Object.values(ANCHORS).flat());
  const remaining=ALL_PLAYERS.filter(p=>!anchoredNames.has(p.name));
  const playerNames=new Set(ALL_PLAYERS.map(p=>p.name));

  const packages=[];
  const usedNames=new Set([...EXPLICIT_NAMES]);

  // Add explicit packages first
  EXPLICIT_PACKAGES.forEach(names=>{
    packages.push(names);
  });

  // Auto-group remaining by father (excluding explicit names)
  remaining.forEach(player=>{
    if(usedNames.has(player.name))return;
    const myFather=player.father&&playerNames.has(player.father)&&remaining.find(p=>p.name===player.father&&!usedNames.has(p.name));
    if(myFather) return; // handled when father is processed
    const myChildren=remaining.filter(p=>p.father===player.name&&!usedNames.has(p.name)&&!EXPLICIT_NAMES.has(p.name));
    if(myChildren.length>0){
      const pkg=[player,...myChildren].map(p=>p.name);
      pkg.forEach(n=>usedNames.add(n));
      packages.push(pkg);
    } else {
      usedNames.add(player.name);
      packages.push([player.name]);
    }
  });

  shuffle(packages);
  packages.sort((a,b)=>b.length-a.length);

  // Assign using lowest-headcount round-robin
  const tempCounts={};
  TEAMS.forEach(t=>tempCounts[t.id]=ANCHORS[t.id]?ANCHORS[t.id].length:0);
  const seq=[];

  packages.forEach(pkg=>{
    const sz=pkg.length;
    const sorted=TEAMS.map(t=>({id:t.id,count:tempCounts[t.id]})).sort((a,b)=>a.count-b.count);
    const minC=sorted[0].count;
    let eligible=sorted.filter(c=>c.count===minC&&c.count+sz<=MAX);
    if(!eligible.length) eligible=sorted.filter(c=>c.count+sz<=MAX);
    if(!eligible.length) eligible=[sorted[0]];
    const picked=eligible[Math.floor(Math.random()*eligible.length)];
    tempCounts[picked.id]+=sz;
    seq.push({players:pkg,teamId:picked.id});
  });
  return seq;
}

function buildUI(){
  const roster=document.getElementById('roster');
  roster.innerHTML='';
  TEAMS.forEach(t=>{
    const card=document.createElement('div');
    card.className='d-team-card';
    card.id=`card-${t.id}`;
    card.innerHTML=`
      <div class="d-team-header" style="background:${t.hdrBg}">
        <div class="d-team-name" style="color:${t.nameColor}">${t.name}</div>
        <div class="d-team-owner" style="color:${t.nameColor}">${t.owner}</div>
        <div class="d-team-count" id="count-${t.id}" style="color:${t.nameColor}">0 / ${MAX}</div>
      </div>
      <div class="d-team-players" id="players-${t.id}"></div>
    `;
    roster.appendChild(card);
  });
  Object.entries(ANCHORS).forEach(([tid,names])=>{
    names.forEach(n=>addPlayerToCard(tid,n,true));
    updateCount(tid);
  });
}

function addPlayerToCard(tid,playerName,isAnchor){
  const container=document.getElementById(`players-${tid}`);
  if(!container)return;
  const el=document.createElement('div');
  el.className='d-player-entry'+(isAnchor?' anchor':'');
  el.textContent=playerName;
  container.appendChild(el);
  setTimeout(()=>el.classList.add('visible'),30);
}

function updateCount(tid){
  const el=document.getElementById(`count-${tid}`);
  if(!el)return;
  const count=document.getElementById(`players-${tid}`).querySelectorAll('.d-player-entry').length;
  el.textContent=`${count} / ${MAX}`;
}

function initDraft(){
  draftSequence=calcDraft();
  currentPick=0;
  buildUI();
  document.getElementById('jumbo-player').textContent='—';
  document.getElementById('jumbo-player').className='d-jumbo-value';
  document.getElementById('jumbo-team').textContent='—';
  document.getElementById('jumbo-team').className='d-jumbo-value';
  document.getElementById('complete-banner').style.display='none';
  document.getElementById('btn-draw').disabled=false;
  document.getElementById('btn-draw').textContent='Draw Next Pick';
  updatePickCounter();
}

function updatePickCounter(){
  document.getElementById('pick-counter').textContent=`Pick ${currentPick} of ${draftSequence.length}`;
}

function rndPlayer(){return ALL_PLAYERS[Math.floor(Math.random()*ALL_PLAYERS.length)].name}
function rndTeam(){return TEAMS[Math.floor(Math.random()*TEAMS.length)].name}

function drawPick(){
  if(isAnimating||currentPick>=draftSequence.length)return;
  isAnimating=true;
  document.getElementById('btn-draw').disabled=true;

  const pick=draftSequence[currentPick];
  const teamObj=TEAMS.find(t=>t.id===pick.teamId);
  const playerLabel=pick.players.join('\n+ ');

  const jpEl=document.getElementById('jumbo-player');
  const jtEl=document.getElementById('jumbo-team');
  jpEl.className='d-jumbo-value flashing';
  jtEl.className='d-jumbo-value flashing';

  const t1=setInterval(()=>jpEl.textContent=rndPlayer(),80);
  const t2=setInterval(()=>jtEl.textContent=rndTeam(),80);

  setTimeout(()=>{
    clearInterval(t1);
    jpEl.textContent=playerLabel;
    jpEl.className='d-jumbo-value landed-player';
  },1500);

  setTimeout(()=>{
    clearInterval(t2);
    jtEl.textContent=teamObj.name;
    jtEl.className='d-jumbo-value landed-team';
    pick.players.forEach(pn=>addPlayerToCard(pick.teamId,pn,false));
    updateCount(pick.teamId);
    currentPick++;
    updatePickCounter();
    isAnimating=false;
    if(currentPick>=draftSequence.length){
      document.getElementById('btn-draw').disabled=true;
      document.getElementById('btn-draw').textContent='Draft Complete';
      document.getElementById('complete-banner').style.display='block';
    } else {
      document.getElementById('btn-draw').disabled=false;
    }
  },2500);
}

document.getElementById('btn-draw').addEventListener('click',drawPick);
document.getElementById('btn-reset').addEventListener('click',initDraft);
initDraft();
</script>
