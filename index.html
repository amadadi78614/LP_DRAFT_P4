<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPFL Padel Draft Lottery</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Inter:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; font-family: 'Inter', sans-serif; color: #f1f5f9; min-height: 100vh; }
.font-oswald { font-family: 'Oswald', sans-serif; }

/* Team card theming */
.team-card { border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.12); }
.tc1 { background: #1e1030; border-top: 4px solid #c084fc; }
.tc2 { background: #0c1f3f; border-top: 4px solid #60a5fa; }
.tc3 { background: #052e1c; border-top: 4px solid #34d399; }
.tc4 { background: #2a1200; border-top: 4px solid #fb923c; }
.tc5 { background: #1c1600; border-top: 4px solid #facc15; }
.tc6 { background: #280a0a; border-top: 4px solid #f87171; }

.tc1-text { color: #d8b4fe; }
.tc2-text { color: #93c5fd; }
.tc3-text { color: #6ee7b7; }
.tc4-text { color: #fdba74; }
.tc5-text { color: #fde68a; }
.tc6-text { color: #fca5a5; }

/* Progress bar */
.prog-bar { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.tc1 .prog-fill { background: #c084fc; }
.tc2 .prog-fill { background: #60a5fa; }
.tc3 .prog-fill { background: #34d399; }
.tc4 .prog-fill { background: #fb923c; }
.tc5 .prog-fill { background: #facc15; }
.tc6 .prog-fill { background: #f87171; }

/* Player entries */
.player-entry {
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity 0.35s, transform 0.35s;
  font-size: 11.5px;
  padding: 4px 7px;
  border-radius: 5px;
  margin: 2px 0;
  color: #cbd5e1;
  background: rgba(255,255,255,0.07);
  line-height: 1.4;
}
.player-entry.visible { opacity: 1; transform: translateY(0); }
.player-entry.new-single {
  background: rgba(96,165,250,0.18);
  color: #bfdbfe;
  font-weight: 600;
}
.player-entry.new-family {
  background: rgba(167,139,250,0.18);
  color: #ddd6fe;
  font-weight: 600;
}
.player-entry.anchor-style {
  background: rgba(255,255,255,0.05);
  color: #94a3b8;
  font-style: italic;
}

/* Jumbotron */
.jumbotron {
  background: #1e293b;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
}

/* Slot machine */
.slot-val {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(18px, 2.5vw, 26px);
  font-weight: 600;
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: pre-line;
  line-height: 1.25;
  transition: color 0.2s;
  text-align: center;
}
.slot-val.idle    { color: #334155; }
.slot-val.spin    { color: #334155; animation: flicker .07s infinite alternate; }
.slot-val.player  { color: #fcd34d; text-shadow: 0 0 24px rgba(252,211,77,.45); }
.slot-val.team    { color: #34d399; text-shadow: 0 0 24px rgba(52,211,153,.4); }
@keyframes flicker { from{opacity:.5} to{opacity:1} }

/* Phase badge */
.phase-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 16px; border-radius: 20px;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;
  transition: all .4s;
}
.pb-idle { background:#1e293b; border:1px solid #334155; color:#475569; }
.pb-p1   { background:rgba(96,165,250,.15); border:1px solid rgba(96,165,250,.4); color:#93c5fd; }
.pb-p2   { background:rgba(167,139,250,.15); border:1px solid rgba(167,139,250,.4); color:#c4b5fd; }
.pb-p3   { background:rgba(52,211,153,.15); border:1px solid rgba(52,211,153,.4); color:#6ee7b7; }
.pb-done { background:rgba(252,211,77,.15); border:1px solid rgba(252,211,77,.4); color:#fcd34d; }

/* Buttons */
.btn-draw {
  background: linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff; border:none; padding:12px 40px; border-radius:10px;
  font-family:'Oswald',sans-serif; font-size:16px; font-weight:600;
  letter-spacing:2px; cursor:pointer; text-transform:uppercase;
  transition:all .2s; box-shadow:0 4px 20px rgba(37,99,235,.4);
}
.btn-draw:hover:not(:disabled){ background:linear-gradient(135deg,#3b82f6,#2563eb); transform:translateY(-1px); }
.btn-draw:disabled{ background:#1e293b; color:#334155; cursor:not-allowed; box-shadow:none; transform:none; }
.btn-reset {
  background:transparent; border:1px solid #334155; color:#64748b;
  padding:10px 20px; border-radius:8px; font-size:12px; cursor:pointer;
  letter-spacing:1px; text-transform:uppercase; transition:all .2s;
}
.btn-reset:hover{ border-color:#475569; color:#94a3b8; }

/* Section label inside card */
.sec-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #475569; padding: 3px 6px 2px; border-bottom: 1px solid rgba(255,255,255,.06); margin-bottom: 2px; }

/* Pulse on card when picked */
.card-pulse { animation: cpulse .5s ease; }
@keyframes cpulse { 0%{box-shadow:0 0 0 0 rgba(255,255,255,.25)} 100%{box-shadow:0 0 0 10px transparent} }

/* Complete banner */
.complete-banner {
  display:none;
  background: linear-gradient(135deg,#052e1c,#0f172a);
  border:1px solid #065f46; border-radius:12px;
  padding:18px; text-align:center;
  font-family:'Oswald',sans-serif; font-size:22px;
  color:#34d399; letter-spacing:3px; text-transform:uppercase;
}

::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
</style>
</head>
<body class="p-4">

<!-- HEADER -->
<div style="background:linear-gradient(135deg,#162040,#0f172a);border-bottom:1px solid rgba(255,255,255,.08)" class="rounded-xl mb-4 px-6 py-5 text-center">
  <div class="font-oswald text-3xl font-bold tracking-widest text-white uppercase">⚡ The Official Padel Draft ⚡</div>
  <div class="flex justify-center gap-3 mt-2">
    <span class="text-xs tracking-widest text-slate-400 uppercase border border-slate-700 rounded-full px-3 py-1">6 Teams</span>
    <span class="text-xs tracking-widest text-slate-400 uppercase border border-slate-700 rounded-full px-3 py-1">48 Players</span>
    <span class="text-xs tracking-widest text-slate-400 uppercase border border-slate-700 rounded-full px-3 py-1">LPFL Season 4</span>
  </div>
</div>

<!-- CONTROLS -->
<div style="background:#1e293b;border:1px solid rgba(255,255,255,.08)" class="rounded-xl mb-4 px-5 py-3 flex flex-wrap items-center justify-between gap-3">
  <div class="flex items-center gap-3">
    <span class="phase-badge pb-idle" id="phase-badge">⏳ Awaiting Draft</span>
    <span class="text-xs text-slate-500" id="pick-counter">Pick 0 of 0</span>
  </div>
  <div class="flex items-center gap-3">
    <button class="btn-reset" id="btn-reset">↺ Reset</button>
    <button class="btn-draw" id="btn-draw">▶ Draw Next Pick</button>
  </div>
</div>

<!-- JUMBOTRON -->
<div class="jumbotron mb-4 p-5">
  <div class="grid grid-cols-2 gap-4">
    <div class="text-center">
      <div class="text-xs tracking-widest text-slate-500 uppercase mb-2">🎯 The Player(s)</div>
      <div class="slot-val idle" id="jumbo-player">— — —</div>
      <div class="mt-1 text-xs text-slate-500" id="jumbo-pick-type"></div>
    </div>
    <div class="text-center" style="border-left:1px solid rgba(255,255,255,.06)">
      <div class="text-xs tracking-widest text-slate-500 uppercase mb-2">🏠 The Destination</div>
      <div class="slot-val idle" id="jumbo-team">— — —</div>
      <div class="mt-1 text-xs text-slate-500" id="jumbo-tally"></div>
    </div>
  </div>
</div>

<!-- ROSTER -->
<div class="grid grid-cols-6 gap-3 mb-4" id="roster-grid"></div>

<!-- COMPLETE -->
<div class="complete-banner" id="complete-banner">🏆 Draft Complete — All 48 Players Assigned 🏆</div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const TEAM_DEFS = [
  {id:'t1',name:'Team 1',cls:'tc1',tcls:'tc1-text'},
  {id:'t2',name:'Team 2',cls:'tc2',tcls:'tc2-text'},
  {id:'t3',name:'Team 3',cls:'tc3',tcls:'tc3-text'},
  {id:'t4',name:'Team 4',cls:'tc4',tcls:'tc4-text'},
  {id:'t5',name:'Team 5',cls:'tc5',tcls:'tc5-text'},
  {id:'t6',name:'Team 6',cls:'tc6',tcls:'tc6-text'},
];

const PLAYERS = [
  // ANCHORS
  {name:"Shoaib Nomani",    isKid:false, preAssigned:"t1"},
  {name:"Nomz",             isKid:false, preAssigned:"t1"},
  {name:"Aadam Nomani",     isKid:true,  preAssigned:"t1"},
  {name:"Rafiq Mohamed",    isKid:false, preAssigned:"t2"},
  {name:"Ayaan Mohamed",    isKid:true,  preAssigned:"t2"},
  {name:"Irshaad Moola",    isKid:false, preAssigned:"t3"},
  {name:"Mohamed Moola",    isKid:true,  preAssigned:"t3"},
  {name:"Isa Moola",        isKid:true,  preAssigned:"t3"},
  {name:"Muhammad Mangerah",isKid:false, preAssigned:"t4"},
  {name:"Ebrahim Mangerah", isKid:true,  preAssigned:"t4"},
  {name:"Yusuf Ismail",     isKid:false, preAssigned:"t5"},
  {name:"Zuhayr Ismail",    isKid:true,  preAssigned:"t5"},
  // FAMILIES
  {name:"Fahad",            isKid:false, family:"fam1"}, {name:"Hoosein Patel",   isKid:true,  family:"fam1"},
  {name:"Irfaan",           isKid:false, family:"fam2"}, {name:"Amaar",           isKid:true,  family:"fam2"},
  {name:"Azhar Sujee",      isKid:false, family:"fam3"}, {name:"Yahya Sujee",     isKid:true,  family:"fam3"},
  {name:"Oz",               isKid:false, family:"fam4"}, {name:"Ruro",            isKid:true,  family:"fam4"},
  {name:"Stiaan Duvenhage", isKid:false, family:"fam5"}, {name:"Dewan Duvenhage", isKid:true,  family:"fam5"},
  {name:"Scharl",           isKid:false, family:"fam6"}, {name:"Jude",            isKid:true,  family:"fam6"}, {name:"Seth van den Berg",isKid:true,family:"fam6"},
  {name:"Fiaz Bhikoo",      isKid:false, family:"fam7"}, {name:"Arman Bhikoo",    isKid:true,  family:"fam7"},
  // SINGLE ADULTS
  {name:"Adil Amod",isKid:false},{name:"Akmeer Amod",isKid:false},{name:"Christiaan van Aardt",isKid:false},
  {name:"Dian Erasmus",isKid:false},{name:"Jameel Valley",isKid:false},{name:"Jovan Erasmus",isKid:false},
  {name:"Junaid Ganchee",isKid:false},{name:"Mauritz van der Mescht",isKid:false},{name:"Michael Smit",isKid:false},
  {name:"Sahal Yunus",isKid:false},{name:"Sailesh Nagar",isKid:false},{name:"Sandeep Daya",isKid:false},
  {name:"Spanner Mescht",isKid:false},{name:"Stephen Remane",isKid:false},{name:"Yusuf Amod",isKid:false},
  {name:"Zandre de Kok",isKid:false},{name:"Zinidine Morgan",isKid:false},
  // SINGLE YOUTH
  {name:"Nathan Mckenzie",isKid:true},{name:"Jogee",isKid:true},{name:"Huzaifah Sujee",isKid:true},{name:"Mikel Pillay",isKid:true},
];

const MAX_A=5, MAX_K=3;
const RIVALRY={fam1:'t3'};

// ── SOLVER ────────────────────────────────────────────────────
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}

function calcDraft(){
  // Anchor counts
  function freshCounts(){
    const c={};
    TEAM_DEFS.forEach(t=>c[t.id]={a:0,k:0});
    PLAYERS.filter(p=>p.preAssigned).forEach(p=>{
      if(p.isKid) c[p.preAssigned].k++; else c[p.preAssigned].a++;
    });
    return c;
  }

  const famMap={};
  PLAYERS.filter(p=>p.family).forEach(p=>{if(!famMap[p.family])famMap[p.family]=[];famMap[p.family].push(p);});
  const fams=Object.entries(famMap).map(([id,members])=>({id,members}));
  const soloA=PLAYERS.filter(p=>!p.preAssigned&&!p.family&&!p.isKid);
  const soloK=PLAYERS.filter(p=>!p.preAssigned&&!p.family&&p.isKid);
  const tids=TEAM_DEFS.map(t=>t.id);

  for(let attempt=1;attempt<=10000;attempt++){
    const c=freshCounts();
    const assign={};
    let ok=true;

    const sf=shuffle([...fams]);
    const sa=shuffle([...soloA]);
    const sk=shuffle([...soloK]);

    // Assign families
    for(const fam of sf){
      const fa=fam.members.filter(p=>!p.isKid).length;
      const fk=fam.members.filter(p=>p.isKid).length;
      let elig=tids.filter(tid=>{
        if(c[tid].a+fa>MAX_A||c[tid].k+fk>MAX_K) return false;
        if(RIVALRY[fam.id]===tid) return false;
        return true;
      });
      if(!elig.length){ok=false;break;}
      elig.sort((a,b)=>(c[a].a+c[a].k)-(c[b].a+c[b].k));
      const p=elig[0];
      assign[fam.id]=p; c[p].a+=fa; c[p].k+=fk;
    }
    if(!ok) continue;

    // Assign solo adults
    for(const p of sa){
      let elig=tids.filter(tid=>c[tid].a<MAX_A);
      if(!elig.length){ok=false;break;}
      elig.sort((a,b)=>(c[a].a+c[a].k)-(c[b].a+c[b].k));
      assign[p.name]=elig[0]; c[elig[0]].a++;
    }
    if(!ok) continue;

    // Assign solo kids
    for(const p of sk){
      let elig=tids.filter(tid=>c[tid].k<MAX_K);
      if(!elig.length){ok=false;break;}
      elig.sort((a,b)=>(c[a].a+c[a].k)-(c[b].a+c[b].k));
      assign[p.name]=elig[0]; c[elig[0]].k++;
    }
    if(!ok) continue;

    if(!tids.every(tid=>c[tid].a===MAX_A&&c[tid].k===MAX_K)) continue;

    console.log(`✅ Solved in ${attempt} attempt(s)`);

    // Build sequence — anchors drawn live (Phase 0), then P1 soloA, P2 fams, P3 soloK
    const anchors=PLAYERS.filter(p=>p.preAssigned);
    shuffle(anchors);
    const p0=anchors.map(p=>({players:[p],teamId:p.preAssigned,phase:0,type:'Anchor'}));
    const p1=sa.map(p=>({players:[p],teamId:assign[p.name],phase:1,type:'Single Adult'}));
    const p2=sf.map(fam=>({players:fam.members,teamId:assign[fam.id],phase:2,type:'Family Package'}));
    const p3=sk.map(p=>({players:[p],teamId:assign[p.name],phase:3,type:'Single Youth'}));

    return {seq:[...p0,...p1,...p2,...p3]};
  }
  return null;
}

// ── LIVE STATE ────────────────────────────────────────────────
const liveState={};

function buildUI(){
  const grid=document.getElementById('roster-grid');
  grid.innerHTML='';
  TEAM_DEFS.forEach(t=>{
    liveState[t.id]={a:0,k:0};
    const card=document.createElement('div');
    card.className=`team-card ${t.cls}`;
    card.id=`card-${t.id}`;
    card.innerHTML=`
      <div class="px-3 pt-3 pb-2">
        <div class="font-oswald text-sm font-semibold tracking-widest uppercase mb-2 ${t.tcls}">${t.name}</div>
        <div class="prog-bar mb-1"><div class="prog-fill" id="prog-${t.id}" style="width:0%"></div></div>
        <div style="font-size:11px;color:#94a3b8" id="tally-${t.id}">0 / 8</div>
      </div>
      <div style="height:1px;background:rgba(255,255,255,.07);margin:0 8px"></div>
      <div class="px-2 pt-2 pb-1">
        <div class="sec-label">Adults</div>
        <div id="adults-${t.id}"></div>
      </div>
      <div style="height:1px;background:rgba(255,255,255,.07);margin:0 8px 4px"></div>
      <div class="px-2 pt-1 pb-2">
        <div class="sec-label">Youth</div>
        <div id="kids-${t.id}"></div>
      </div>
    `;
    grid.appendChild(card);
  });

}

function addPlayer(tid, player, style){
  const el=document.createElement('div');
  el.className='player-entry';
  if(style==='anchor') el.classList.add('anchor-style');
  else if(style==='family') el.classList.add('new-family');
  else el.classList.add('new-single');
  el.textContent=(style==='family'?'👨‍👦 ':style==='anchor'?'⚓ ':'')+player.name+(player.isKid?' 👦':'');
  const container=document.getElementById(player.isKid?`kids-${tid}`:`adults-${tid}`);
  if(!container)return;
  container.appendChild(el);
  // Anchors appear immediately without animation
  if(style==='anchor'){ el.style.opacity=1; el.style.transform='none'; el.classList.add('visible'); }
  else { setTimeout(()=>el.classList.add('visible'),40); setTimeout(()=>{el.classList.remove('new-family','new-single');},2200); }
}

function updateTally(tid){
  const s=liveState[tid];
  const total=s.a+s.k;
  document.getElementById(`tally-${tid}`).textContent=`${s.a}/5 Adults · ${s.k}/3 Youth`;
  document.getElementById(`prog-${tid}`).style.width=`${(total/8)*100}%`;
}

function setPhase(ph){
  const el=document.getElementById('phase-badge');
  if(ph===0){el.className='phase-badge pb-idle';el.textContent='⏳ Awaiting Draft';return;}
  if(ph==='anchor'){el.className='phase-badge pb-done';el.textContent='⚓ Phase 0 — Anchors';return;}
  const map={1:'pb-p1 🧑 Phase 1 — Single Adults',2:'pb-p2 👨‍👦 Phase 2 — Family Packages',3:'pb-p3 👦 Phase 3 — Youth Players','done':'pb-done ✅ Draft Complete'};
  const parts=map[ph].split(' ');
  el.className='phase-badge '+parts[0];
  el.textContent=map[ph].slice(parts[0].length+1);
}

// ── ANIMATION ─────────────────────────────────────────────────
let draftSeq=[], currentPick=0, isAnimating=false;
const ALL_SPIN=PLAYERS.map(p=>p.name);
const TEAM_SPIN=TEAM_DEFS.map(t=>t.name);
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}

function drawPick(){
  if(isAnimating||currentPick>=draftSeq.length)return;
  isAnimating=true;
  document.getElementById('btn-draw').disabled=true;

  const pick=draftSeq[currentPick];
  const td=TEAM_DEFS.find(t=>t.id===pick.teamId);
  const isFamily=pick.phase===2;
  const label=pick.players.map(p=>p.name).join('\n+ ');

  setPhase(pick.phase===0?'anchor':pick.phase);

  const jpEl=document.getElementById('jumbo-player');
  const jtEl=document.getElementById('jumbo-team');
  const ptEl=document.getElementById('jumbo-pick-type');
  const ttEl=document.getElementById('jumbo-tally');

  jpEl.className='slot-val spin'; jtEl.className='slot-val spin';
  ptEl.textContent=''; ttEl.textContent='';

  const i1=setInterval(()=>jpEl.textContent=rnd(ALL_SPIN),75);
  const i2=setInterval(()=>jtEl.textContent=rnd(TEAM_SPIN),75);

  setTimeout(()=>{
    clearInterval(i1);
    jpEl.textContent=label;
    jpEl.className='slot-val player';
    ptEl.innerHTML=isFamily
      ?'<span style="color:#c4b5fd;font-weight:600">👨‍👦 Family Package</span>'
      :pick.phase===0
        ?'<span style="color:#fcd34d">⚓ Anchor Pick</span>'
        :pick.phase===1
          ?'<span style="color:#93c5fd">🧑 Single Adult</span>'
          :'<span style="color:#6ee7b7">👦 Single Youth</span>';
  },1500);

  setTimeout(()=>{
    clearInterval(i2);
    jtEl.textContent=td.name;
    jtEl.className='slot-val team';

    const card=document.getElementById(`card-${pick.teamId}`);
    card.classList.add('card-pulse');
    setTimeout(()=>card.classList.remove('card-pulse'),600);

    pick.players.forEach(p=>{
      addPlayer(pick.teamId,p,isFamily?'family':'single');
      if(p.isKid) liveState[pick.teamId].k++; else liveState[pick.teamId].a++;
    });
    updateTally(pick.teamId);

    const s=liveState[pick.teamId];
    ttEl.textContent=`${s.a}/5 Adults · ${s.k}/3 Youth`;

    currentPick++;
    document.getElementById('pick-counter').textContent=`Pick ${currentPick} of ${draftSeq.length}`;
    isAnimating=false;

    if(currentPick>=draftSeq.length){
      document.getElementById('btn-draw').disabled=true;
      document.getElementById('btn-draw').textContent='✓ Draft Complete';
      document.getElementById('complete-banner').style.display='block';
      setPhase('done');
    } else {
      document.getElementById('btn-draw').disabled=false;
    }
  },2600);
}

function initDraft(){
  const result=calcDraft();
  if(!result){alert('Solver failed — please reset.');return;}
  draftSeq=result.seq;
  currentPick=0;
  buildUI();

  const jpEl=document.getElementById('jumbo-player');
  const jtEl=document.getElementById('jumbo-team');
  jpEl.textContent='— — —'; jpEl.className='slot-val idle';
  jtEl.textContent='— — —'; jtEl.className='slot-val idle';
  document.getElementById('jumbo-pick-type').textContent='';
  document.getElementById('jumbo-tally').textContent='';
  document.getElementById('complete-banner').style.display='none';
  document.getElementById('btn-draw').disabled=false;
  document.getElementById('btn-draw').textContent='▶ Draw Next Pick';
  document.getElementById('pick-counter').textContent=`Pick 0 of ${draftSeq.length}`;
  setPhase(0);
}

document.getElementById('btn-draw').addEventListener('click',drawPick);
document.getElementById('btn-reset').addEventListener('click',initDraft);
initDraft();
</script>
</body>
</html>
